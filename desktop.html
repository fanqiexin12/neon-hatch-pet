<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Hatch Desktop Pet</title>
    <link rel="stylesheet" href="./desktop.css" />
  </head>
  <body>
    <main class="pet-shell" id="petShell" aria-label="桌面宠物">
      <canvas
        id="desktopPetCanvas"
        width="240"
        height="220"
        aria-label="桌面像素宠物，左键互动，拖动移动，右键打开菜单"
      ></canvas>
      <form class="name-editor is-hidden" id="nameEditor" aria-hidden="true">
        <label class="name-editor__label" id="nameEditorLabel" for="nameEditorInput">
          设置名称
        </label>
        <input
          id="nameEditorInput"
          class="name-editor__input"
          maxlength="12"
          autocomplete="off"
          spellcheck="false"
        />
        <div class="name-editor__actions">
          <button type="submit">确定</button>
          <button type="button" id="nameEditorCancel">取消</button>
        </div>
        <p class="name-editor__hint">回车保存，Esc 取消</p>
      </form>
      <section class="activity-prompt is-hidden" id="activityPrompt" aria-hidden="true">
        <h2 class="activity-prompt__title" id="activityPromptTitle">现在在做什么？</h2>
        <p class="activity-prompt__body" id="activityPromptBody">
          选一个，我陪你进入对应模式。
        </p>
        <div class="activity-prompt__options" id="activityPromptOptions"></div>
        <button class="activity-prompt__close" id="activityPromptClose" type="button">稍后</button>
      </section>
      <div class="sr-only" id="desktopStatus" aria-live="polite">
        我还是一颗蛋。点击或右键菜单可以孵化。
      </div>
    </main>

    <script src="./desktop-pet.js"></script>
  </body>
</html>
