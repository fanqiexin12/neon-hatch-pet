<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Hatch Desktop Pet</title>
    <link rel="stylesheet" href="./desktop.css" />
  </head>
  <body>
    <main class="pet-shell" id="petShell" aria-label="桌面宠物">
      <canvas
        id="desktopPetCanvas"
        width="240"
        height="220"
        aria-label="桌面像素宠物，左键互动，拖动移动，右键打开菜单"
      ></canvas>
      <form class="name-editor is-hidden" id="nameEditor" aria-hidden="true">
        <label class="name-editor__label" id="nameEditorLabel" for="nameEditorInput">
          设置名称
        </label>
        <input
          id="nameEditorInput"
          class="name-editor__input"
          maxlength="12"
          autocomplete="off"
          spellcheck="false"
        />
        <div class="name-editor__actions">
          <button type="submit">确定</button>
          <button type="button" id="nameEditorCancel">取消</button>
        </div>
        <p class="name-editor__hint">回车保存，Esc 取消</p>
      </form>
      <section class="activity-prompt is-hidden" id="activityPrompt" aria-hidden="true">
        <h2 class="activity-prompt__title" id="activityPromptTitle">现在在做什么？</h2>
        <p class="activity-prompt__body" id="activityPromptBody">
          选一个，我陪你进入对应模式。
        </p>
        <div class="activity-prompt__options" id="activityPromptOptions"></div>
        <button class="activity-prompt__close" id="activityPromptClose" type="button">稍后</button>
      </section>
      <section class="todo-panel is-hidden" id="todoPanel" aria-hidden="true">
        <h2 class="todo-panel__title" id="todoPanelTitle">今日计划</h2>
        <p class="todo-panel__body" id="todoPanelBody">
          每行写一件今天要做的事。
        </p>
        <div class="todo-panel__meta" id="todoMeta">还剩 0 项</div>
        <textarea
          id="todoInput"
          class="todo-panel__input"
          rows="4"
          maxlength="220"
          spellcheck="false"
          placeholder="例：整理笔记&#10;完成一个小任务&#10;晚上复盘"
        ></textarea>
        <div class="todo-panel__list" id="todoList"></div>
        <div class="todo-panel__actions">
          <button type="button" id="todoSave">保存</button>
          <button type="button" id="todoFeedback">反馈</button>
          <button type="button" id="todoAllDone">全完</button>
          <button type="button" id="todoCarryover" hidden>延续</button>
          <button type="button" id="todoLater">稍后</button>
        </div>
        <button class="todo-panel__close" id="todoClose" type="button">关闭</button>
      </section>
      <section class="journal-panel is-hidden" id="journalPanel" aria-hidden="true">
        <h2 class="journal-panel__title">陪伴日记</h2>
        <p class="journal-panel__body">
          这里会记录最近的互动、心情和今日进度。
        </p>
        <div class="journal-panel__list" id="journalList"></div>
        <div class="journal-panel__actions">
          <button type="button" id="journalClear">清空</button>
          <button type="button" id="journalClose">关闭</button>
        </div>
      </section>
      <nav class="quick-bar" id="quickBar" aria-label="快捷互动栏" aria-hidden="true">
        <div class="quick-bar__sub" id="quickBarSub" aria-label="展开的互动"></div>
        <div class="quick-bar__cats" id="quickBarCats">
          <button class="quick-bar__cat" type="button" data-quick-cat="hatch" data-quick-mode="egg">
            <span class="quick-bar__icon">EGG</span><span>孵化</span>
          </button>
          <button class="quick-bar__cat" type="button" data-quick-cat="care" data-quick-mode="hatched">
            <span class="quick-bar__icon">CARE</span><span>照顾</span>
          </button>
          <button class="quick-bar__cat" type="button" data-quick-cat="fun" data-quick-mode="hatched">
            <span class="quick-bar__icon">PLAY</span><span>玩乐</span>
          </button>
          <button class="quick-bar__cat" type="button" data-quick-cat="mood" data-quick-mode="hatched">
            <span class="quick-bar__icon">MOOD</span><span>心情</span>
          </button>
          <button class="quick-bar__cat" type="button" data-quick-cat="todo" data-quick-mode="hatched">
            <span class="quick-bar__icon">TODO</span><span>今日</span>
          </button>
          <button class="quick-bar__cat" type="button" data-quick-cat="more" data-quick-mode="hatched">
            <span class="quick-bar__icon">MORE</span><span>更多</span>
          </button>
        </div>
      </nav>
      <div class="sr-only" id="desktopStatus" aria-live="polite">
        我还是一颗蛋。点击或右键菜单可以孵化。
      </div>
    </main>

    <script src="./desktop-pet.js"></script>
  </body>
</html>
